<div class="entity-bulk-create-container">
  <div class="page-header">
    <button nz-button nzType="text" (click)="onClickBackButton()">← Back</button>
  </div>

  <div *ngIf="entity$()" class="bulk-create-content">
    <div class="content-header">
      <h1>Bulk Create {{ entity$()!.pluralName }}</h1>
      <button nz-button (click)="onClickFieldsButton()">Select Fields</button>
    </div>

    <nz-card class="bulk-create-card">
      <div *ngIf="visibleFields$().length === 0" class="empty-state">
        <nz-empty nzNotFoundContent="Please select at least one field to continue"></nz-empty>
      </div>

      <div *ngIf="visibleFields$().length > 0" class="spreadsheet-container">
        <table class="bulk-create-table">
          <thead>
            <tr>
              <th class="action-column"></th>
              <th *ngFor="let field of visibleFields$()">{{ field.name }}</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of bulkDataSignal(); let rowIndex = index" class="data-row">
              <td class="action-column">
                <button
                  nz-button
                  nzType="text"
                  nzDanger
                  nzSize="small"
                  (click)="onClickRemoveRow(rowIndex)"
                  *ngIf="bulkDataSignal().length > 1"
                  title="Remove row"
                  class="remove-button">
                  −
                </button>
              </td>
              <td *ngFor="let field of visibleFields$(); let fieldIndex = index" class="data-cell">
                <!-- Text input for short-text and long-text -->
                <input
                  *ngIf="field.type === 'short-text' || field.type === 'long-text'"
                  nz-input
                  type="text"
                  [ngModel]="getCellValue(rowIndex, field.id)"
                  (ngModelChange)="setCellValue(rowIndex, field.id, $event)"
                  (keydown)="onKeyDown($event, rowIndex, fieldIndex)"
                  [attr.data-row]="rowIndex"
                  [attr.data-field-index]="fieldIndex"
                  class="cell-input"
                  [placeholder]="field.name" />
                <!-- Number input for number type -->
                <input
                  *ngIf="field.type === 'number'"
                  nz-input
                  type="number"
                  [ngModel]="getCellValue(rowIndex, field.id)"
                  (ngModelChange)="setCellValue(rowIndex, field.id, $event)"
                  (keydown)="onKeyDown($event, rowIndex, fieldIndex)"
                  [attr.data-row]="rowIndex"
                  [attr.data-field-index]="fieldIndex"
                  class="cell-input"
                  [placeholder]="field.name" />
                <!-- Select for reference type -->
                <nz-select
                  *ngIf="field.type === 'reference'"
                  nzPlaceHolder="Select..."
                  [ngModel]="getCellValue(rowIndex, field.id)"
                  (ngModelChange)="setCellValue(rowIndex, field.id, $event)"
                  (keydown)="onKeyDown($event, rowIndex, fieldIndex)"
                  [attr.data-row]="rowIndex"
                  [attr.data-field-index]="fieldIndex"
                  class="cell-select">
                  <nz-option
                    *ngFor="let opt of getReferencedRecordOptions(field)"
                    [nzValue]="opt.value"
                    [nzLabel]="opt.label">
                  </nz-option>
                </nz-select>
                <!-- Select for option type -->
                <nz-select
                  *ngIf="field.type === 'option'"
                  nzPlaceHolder="Select..."
                  [ngModel]="getCellValue(rowIndex, field.id)"
                  (ngModelChange)="setCellValue(rowIndex, field.id, $event)"
                  (keydown)="onKeyDown($event, rowIndex, fieldIndex)"
                  [attr.data-row]="rowIndex"
                  [attr.data-field-index]="fieldIndex"
                  class="cell-select">
                  <nz-option *ngFor="let val of field.optionValues" [nzValue]="val" [nzLabel]="val"></nz-option>
                </nz-select>
                <!-- Multi-select for reference-list type -->
                <nz-select
                  *ngIf="field.type === 'reference-list'"
                  nzMode="multiple"
                  nzPlaceHolder="Select..."
                  [ngModel]="getRefListValues(rowIndex, field.id)"
                  (ngModelChange)="setRefListValues(rowIndex, field.id, $event)"
                  (keydown)="onKeyDown($event, rowIndex, fieldIndex)"
                  [attr.data-row]="rowIndex"
                  [attr.data-field-index]="fieldIndex"
                  class="cell-select">
                  <nz-option
                    *ngFor="let opt of getReferencedRecordOptions(field)"
                    [nzValue]="opt.value"
                    [nzLabel]="opt.label">
                  </nz-option>
                </nz-select>
              </td>
            </tr>
          </tbody>
        </table>
        <div class="table-actions">
          <button nz-button (click)="onClickAddRow()">+ Add Row</button>
        </div>
      </div>

      <div class="form-actions" *ngIf="visibleFields$().length > 0">
        <button nz-button nzType="default" (click)="onClickBackButton()">Cancel</button>
        <button nz-button nzType="primary" (click)="onClickSave()">Create All</button>
      </div>
    </nz-card>
  </div>

  <!-- Field Selection Modal -->
  <nz-modal
    [(nzVisible)]="isFieldModalOpenSignal"
    nzTitle="Select Fields"
    (nzOnOk)="onConfirmFields()"
    (nzOnCancel)="onCancelFields()">
    <ng-container *nzModalContent>
      <div class="field-checkbox-list">
        <ng-container *ngFor="let field of entity$()!.fields">
          <div *ngIf="isFieldSelectable(field)" class="field-checkbox-item">
            <label nz-checkbox
              [nzChecked]="isPendingFieldVisible(field.id)"
              (nzCheckedChange)="onTogglePendingField(field.id, $event)">
              {{ field.name }}
            </label>
          </div>
        </ng-container>
      </div>
    </ng-container>
  </nz-modal>
</div>
